<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMACNS - 去中心化智能体商业结算网络</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            text-align: center;
        }
        .logo {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 20px;
            color: #a0a0b8;
            margin-bottom: 12px;
        }
        .mission {
            font-size: 16px;
            color: #707088;
            max-width: 500px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        .card {
            background: #12122a;
            border: 1px solid #1e1e3a;
            border-radius: 12px;
            padding: 24px 16px;
        }
        .card .number {
            font-size: 32px;
            font-weight: 700;
            color: #00d4ff;
        }
        .card .label {
            font-size: 13px;
            color: #808098;
            margin-top: 4px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #00d4ff;
            text-decoration: none;
            padding: 10px 24px;
            border: 1px solid #1e1e3a;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #00d4ff;
            color: #0a0a1a;
            border-color: #00d4ff;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #505068;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">DMACNS</div>
        <div class="subtitle">Decentralized Merchant Commerce Network</div>
        <div class="mission">
            让AI智能体安全地做生意<br>
            坏账为零，结算毫秒级，人只需要批准
        </div>

        <div class="cards">
            <div class="card">
                <div class="number">0.5%</div>
                <div class="label">协议服务费</div>
            </div>
            <div class="card">
                <div class="number">0</div>
                <div class="label">坏账风险</div>
            </div>
            <div class="card">
                <div class="number">60+</div>
                <div class="label">应用场景</div>
            </div>
            <div class="card">
                <div class="number">5层</div>
                <div class="label">协议栈架构</div>
            </div>
        </div>

        <div class="links">
            <a href="https://github.com/dmacns/protocol">协议源码</a>
            <a href="https://github.com/dmacns/whitepaper">技术白皮书</a>
            <a href="https://github.com/dmacns/demo">演示Demo</a>
        </div>

        <div class="footer">
            © 2026 DMACNS · 烟台钧润数字科技有限公司
        </div>
    </div>
</body>
</html>
